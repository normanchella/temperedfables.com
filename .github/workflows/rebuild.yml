name: Build & deploy Tempered Fables

# Rebuilds the site from the live RSS feed so new episodes appear
# automatically. Runs on every push, once a day on a schedule, and
# on demand from the Actions tab.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * *"   # daily at 07:00 UTC — adjust as you like
  workflow_dispatch: {}

# ---- For GitHub Pages deploy (default) ----
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build site from live RSS
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

# ------------------------------------------------------------------
# USING CLOUDFLARE PAGES INSTEAD?
# You don't need this workflow's deploy job. In the Cloudflare Pages
# dashboard set:  Build command = npm run build  |  Output dir = dist
# Cloudflare builds on every push automatically. To also pull in new
# episodes on a schedule, create a Deploy Hook in Cloudflare and add a
# tiny scheduled job that curls it, e.g.:
#
#   schedule:
#     - cron: "0 7 * * *"
#   jobs:
#     ping:
#       runs-on: ubuntu-latest
#       steps:
#         - run: curl -X POST "${{ secrets.CF_DEPLOY_HOOK }}"
# ------------------------------------------------------------------
